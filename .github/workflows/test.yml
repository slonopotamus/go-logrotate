name: test

on:
  push:
    branches:
      - main
      - 'release/**'
  pull_request:

jobs:
  golangci-lint:
    runs-on: ubuntu-20.04
    timeout-minutes: 20
    steps:
    - uses: actions/checkout@v4.2.2
      with:
        fetch-depth: 1
    - uses: actions/setup-go@v5
      with:
        go-version: 1.18.x
    - name: golangci-lint
      uses: golangci/golangci-lint-action@v6.1.1
      with:
        version: v1.45.0
        args: --verbose

  test-unit:
    strategy:
      matrix:
        include:
          - os: ubuntu-20.04
            runner: ubuntu-20.04
          - os: windows-2022
            runner: windows-2022
          - os: freebsd
            runner: ubuntu-22.04
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20
    steps:
    - uses: actions/setup-go@v5
      with:
        go-version: 1.18.x
      if: ${{ matrix.os  != 'freebsd' }}
    - uses: actions/checkout@v4.2.2
      with:
        fetch-depth: 1
    - name: "Run unit tests"
      run: go test -v .
      if: ${{ matrix.os  != 'freebsd' }}
    - uses: vmactions/freebsd-vm@v1
      with:
        usesh: true
        prepare: pkg install -y go
        run: go test -v .
      if: ${{ matrix.os  == 'freebsd' }}
